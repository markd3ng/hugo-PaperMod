# Hugo PaperMod example configuration (single-file TOML)
# Source synced from upstream/exampleSite and modernized for this fork baseline.

baseURL = "http://127.0.0.1:1313/"
title = "PaperMod"
copyright = "© [PaperMod Contributors](https://github.com/adityatelange/hugo-PaperMod/graphs/contributors)"
theme = ["hugo-PaperMod"]

enableInlineShortcodes = true
enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
buildExpired = false
mainSections = ["posts", "papermod"]
ignoreLogs = ["shortcode-x-getremote"]

[minify]
disableXML = true

[pagination]
disableAliases = false
pagerSize = 3

[outputFormats.llms]
mediaType = "text/plain"
baseName = "llms"
isPlainText = true
notAlternative = true

[outputs]
home = ["HTML", "RSS", "JSON", "llms"]

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false

[services.instagram]
disableInlineCSS = true

[services.x]
disableInlineCSS = true

# -----------------------------------------------------------------------------
# Languages
# -----------------------------------------------------------------------------

[languages.en]
languageName = "English"
weight = 1

[languages.en.taxonomies]
category = "categories"
tag = "tags"
series = "series"

[[languages.en.menu.main]]
name = "Archive"
url = "archives"
weight = 5

[[languages.en.menu.main]]
name = "Search"
url = "search/"
weight = 10

[[languages.en.menu.main]]
name = "Tags"
url = "tags/"
weight = 10

[[languages.en.menu.main]]
name = "WiKi"
url = "https://github.com/adityatelange/hugo-PaperMod/wiki/"

[languages.fr]
languageName = ":fr:"
weight = 2
title = "PaperModL2"

[languages.fr.taxonomies]
category = "FRcategories"
tag = "FRtags"
series = "FRseries"

[[languages.fr.menu.main]]
name = "Archive"
url = "archives/"
weight = 5

[[languages.fr.menu.main]]
name = "FRTags"
url = "frtags"
weight = 10

[[languages.fr.menu.main]]
name = "FRCategories"
url = "frcategories"
weight = 10

[[languages.fr.menu.main]]
name = "FRSeries"
url = "frseries"
weight = 10

[[languages.fr.menu.main]]
name = "NullLink"
url = "#"

[languages.fr.params]
languageAltTitle = "French"

[languages.fr.params.profileMode]
enabled = true
title = "PaperMod"
imageUrl = "https://raw.githubusercontent.com/googlefonts/noto-emoji/master/svg/emoji_u1f9d1_1f3fb_200d_1f4bb.svg"
imageTitle = "ProfileMode image"
subtitle = "☄️ Fast | ☁️ Fluent | 🌙 Smooth | 📱 Responsive"

[[languages.fr.params.profileMode.buttons]]
name = "Blog"
url = "posts"

[[languages.fr.params.profileMode.buttons]]
name = "Profile Mode"
url = "https://github.com/adityatelange/hugo-PaperMod/wiki/Features#profile-mode"

[languages.fa]
languageDirection = "rtl"
weight = 3
title = "PaperMod RTL"

[languages.fa.taxonomies]
category = "FAcategories"
tag = "FAtags"
series = "FAseries"

[[languages.fa.menu.main]]
name = "FATags"
url = "fatags"
weight = 10

[languages.fa.params.homeInfoParams]
Title = "Hi there 👋"
Content = "Welcome to RTL layout"

# -----------------------------------------------------------------------------
# Params (grouped by concern)
# -----------------------------------------------------------------------------

[params]
defaultTheme = "auto"
ShowShareButtons = true
ShowReadingTime = true
displayFullLangName = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true
ShowAllPagesInArchive = true
ShowPageNums = true
ShowToc = true
# Enable native TOC relocation into a sidebar container on single pages.
ShowSidebarTOC = true
# Sidebar side for native TOC: "left" or "right".
TocSide = "right"
# TocOpen (native option) still controls the initial expanded state.
mainSections = ["posts", "papermod"]
author = "Theme PaperMod"
# Canonical SEO keys expected by templates
env = "production"
description = "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
images = ["images/papermod-cover.png"]

# Vivia-style code typography (font stack + optional webfont CDN)
codeStyleVivia = true
codeFontFamily = '"JetBrains Mono", "Source Code Pro", Consolas, Monaco, Menlo, monospace'
codeFontSource = "jsdelivr"   # none | google | jsdelivr | custom
codeFontPreconnect = true
codeFontGoogleFamily = "JetBrains+Mono:wght@400;500;700"
codeFontJsdelivrCSS = "https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.2.6/index.min.css"
codeFontCDN = ""              # used when codeFontSource = "custom"

# SEO
[params.seo]
env = "production"
description = "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
images = ["images/papermod-cover.png"]


# Search
[params.search]
enabled = true

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

# Social
[params.social]
fediverse_creator = ""

[[params.socialIcons]]
name = "github"
title = "View Source on Github"
url = "https://github.com/adityatelange/hugo-PaperMod"

[[params.socialIcons]]
name = "Discord"
title = "Join discord community"
url = "https://discord.gg/ahpmTvhVmp"

[[params.socialIcons]]
name = "X"
title = "Share PaperMod on X/Twitter"
url = "https://x.com/intent/tweet/?text=Checkout%20Hugo%20PaperMod%20%E2%9C%A8%0AA%20fast,%20clean,%20responsive%20Hugo%20theme.&url=https://github.com/adityatelange/hugo-PaperMod&hashtags=Hugo,PaperMod"

[[params.socialIcons]]
name = "KoFi"
title = "Buy me a Ko-Fi :)"
url = "https://ko-fi.com/adityatelange"

# Analytics
[params.analytics]
enabled = false

[params.analytics.google]
SiteVerificationTag = ""

[params.analytics.yandex]
SiteVerificationTag = ""

[params.analytics.bing]
SiteVerificationTag = ""

[params.analytics.naver]
SiteVerificationTag = ""

[params.homeInfoParams]
Title = "PaperMod's Demo"
Content = """
👋 Welcome to demo page of Hugo's theme PaperMod!

- **PaperMod** is designed to be clean and simple but fast and responsive theme with useful feature-set that enhances UX.
- Feel free to show your support by giving us a star 🌟 on GitHub and sharing with your friends and social media.
- PaperMod is based on theme [Paper](https://github.com/nanxiaobei/hugo-paper/tree/4330c8b12aa48bfdecbcad6ad66145f679a430b3).
"""

[params.profileMode]
enabled = false
title = "PaperMod"
imageUrl = "#"
imageTitle = "my image"

[[params.profileMode.buttons]]
name = "Archives"
url = "archives"

[[params.profileMode.buttons]]
name = "Tags"
url = "tags"

[params.editPost]
URL = "https://github.com/adityatelange/hugo-PaperMod/tree/exampleSite/content"
Text = "Suggest Changes"
appendFilePath = true

[params.assets]
disableHLJS = true
